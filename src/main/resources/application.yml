spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:lexzip;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
  h2:
    console:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  auth:
    session-ttl-hours: ${SESSION_TTL_HOURS:24}
